# nginx config for transcribe.mailed.co — HTTPS with Let's Encrypt
# Generated from template: __DOMAIN__ is replaced by setup.sh with $DOMAIN.
#
# This file is installed by deploy/setup.sh when $DOMAIN is set.
# For HTTP-only (no TLS), deploy/nginx.conf is used instead.

# HTTP → HTTPS redirect
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __DOMAIN__ _;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — terminate TLS, proxy to app
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name __DOMAIN__ _;

    ssl_certificate     /etc/letsencrypt/live/__DOMAIN__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__DOMAIN__/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 100M;

    # SSE streaming endpoint — disable buffering for real-time segments
    location /api/transcribe/stream {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_buffering        off;
        proxy_cache            off;
        chunked_transfer_encoding on;
    }

    # All other API routes
    location /api/ {
        proxy_pass             http://127.0.0.1:8000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     300s;
        proxy_send_timeout     300s;
        proxy_connect_timeout  10s;
    }

    # SvelteKit frontend (WebSocket-capable)
    location / {
        proxy_pass             http://127.0.0.1:3000;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_set_header       Upgrade           $http_upgrade;
        proxy_set_header       Connection        "upgrade";
        proxy_read_timeout     30s;
    }
}
